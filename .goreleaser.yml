version: 2

project_name: kawarimi

# No before-hooks: dependencies are vendored, and a `go mod tidy` that touched
# go.mod would make the release build dirty.

builds:
  - env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      # windows/arm64 is not a recipient target
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/olemoudi/kawarimi/cmd.version={{ .Version }}
    # Name the binaries kawarimi-<os>-<arch> so dist/ can be passed straight to
    # `kawarimi package build --binaries dist/`.
    binary: kawarimi-{{ .Os }}-{{ .Arch }}

archives:
  # Emit the raw binaries (no tarball wrapper) so they are directly usable both
  # by recipients and as --binaries input.
  - format: binary
    name_template: "{{ .Binary }}"

checksum:
  name_template: checksums.txt

# Ed25519-sign checksums.txt with the maintainer's key (RELEASE_SIGNING_KEY secret,
# inherited from the environment) using the in-repo pure-Go signer. selfupdate
# verifies this signature against the baked-in public key before installing an
# update. Local snapshot builds without the key: pass `--skip=sign`.
signs:
  - id: checksums
    artifacts: checksum
    signature: "${artifact}.sig"
    cmd: go
    args: ["run", "./tools/ksign", "${artifact}", "${signature}"]

release:
  draft: true
  footer: |
    ---
    **Which file do I download?** / **¿Qué archivo descargo?**

    | | |
    | --- | --- |
    | Windows | `kawarimi-windows-amd64.exe` |
    | Mac (Apple Silicon, 2021+) | `kawarimi-darwin-arm64` |
    | Mac (Intel) | `kawarimi-darwin-amd64` |
    | Linux | `kawarimi-linux-amd64` / `kawarimi-linux-arm64` |

    The binaries are unsigned: on **Windows**, if SmartScreen warns, choose
    *More info → Run anyway*; on **macOS**, right-click → *Open* (or System
    Settings → Privacy & Security → *Open Anyway*). En **Windows**, si aparece
    SmartScreen elige *Más información → Ejecutar de todas formas*; en **macOS**,
    clic derecho → *Abrir* (o Ajustes del Sistema → Privacidad y seguridad →
    *Abrir de todas formas*). See the [README](https://github.com/olemoudi/kawarimi#readme).
