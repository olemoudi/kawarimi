name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # goreleaser needs tags + history for the changelog

      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version: '1.25'

      - name: goreleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.3.0
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Ed25519 seed (base64 of the 32-byte seed) that tools/ksign uses to sign
          # checksums.txt. Must be set as a repository Actions secret before tagging.
          # GitHub does not expose secrets as env vars automatically — without this
          # line ksign exits 1 and the release fails.
          RELEASE_SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
