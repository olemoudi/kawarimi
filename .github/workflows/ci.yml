name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version: '1.25'

      - name: gofmt
        run: |
          files=$(git ls-files '*.go' | grep -v '^vendor/')
          test -z "$(gofmt -l $files)" || { echo 'These files need gofmt:'; gofmt -l $files; exit 1; }

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test -short ./...

  # Measures coverage and publishes a self-rendered badge to the `badges` branch
  # (no external service). The README embeds it from raw.githubusercontent.com.
  coverage:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version: '1.25'

      - name: Measure coverage
        # Full suite (not -short): the end-to-end lifecycle scenarios are the most
        # meaningful coverage this project has. -coverpkg=./... credits code
        # exercised across package boundaries (lifecycle tests drive deadswitch,
        # vault, setup, ...) — without it those scenarios count for nothing.
        # Runs only on pushes to main.
        run: |
          go test -coverpkg=./... -coverprofile=cover.out ./...
          pct=$(go tool cover -func=cover.out | awk '/^total:/ {sub(/%/,"",$3); print $3}')
          echo "coverage: ${pct}%"
          echo "PCT=$pct" >> "$GITHUB_ENV"

      - name: Render badge
        run: |
          python3 - <<'EOF'
          import os
          pct = float(os.environ["PCT"])
          color = "#2f855a" if pct >= 75 else "#d9a03c" if pct >= 50 else "#c04a3d"
          label, value = "coverage", f"{pct:.0f}%"
          lw, vw = 62, 40
          svg = f'''<svg xmlns="http://www.w3.org/2000/svg" width="{lw+vw}" height="20" role="img" aria-label="{label}: {value}">
          <linearGradient id="s" x2="0" y2="100%"><stop offset="0" stop-color="#bbb" stop-opacity=".1"/><stop offset="1" stop-opacity=".1"/></linearGradient>
          <clipPath id="r"><rect width="{lw+vw}" height="20" rx="3" fill="#fff"/></clipPath>
          <g clip-path="url(#r)"><rect width="{lw}" height="20" fill="#555"/><rect x="{lw}" width="{vw}" height="20" fill="{color}"/><rect width="{lw+vw}" height="20" fill="url(#s)"/></g>
          <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" font-size="11">
          <text x="{lw/2}" y="14">{label}</text><text x="{lw+vw/2}" y="14">{value}</text></g></svg>'''
          os.makedirs("badge-out", exist_ok=True)
          open("badge-out/coverage.svg", "w").write(svg)
          EOF

      - name: Publish badge to the badges branch
        run: |
          cd badge-out
          git init -q -b badges
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add coverage.svg
          git commit -qm "coverage badge: ${PCT}%"
          git push -q --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" badges
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
